<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="frame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6e2a8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#a47a2a" stop-opacity="0.55"/>
    </linearGradient>
  </defs>
  <!-- Dark teal interior so swatches and counts read clearly -->
  <rect x="3" y="3" width="122" height="122" rx="14" ry="14"
        fill="#0c2530" fill-opacity="0.88"
        stroke="url(#frame)" stroke-width="1.4"/>
</svg>
